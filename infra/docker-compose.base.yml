networks:
  observability-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: obs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: obs-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obs-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ../services/core
    container_name: obs-core
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: observability_flows
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - observability-net

  gateway:
    build:
      context: ../services/gateway
    container_name: obs-gateway
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      NPM_SERVICE_URL: http://npm-service:3100
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - core-service
      - npm-service
    networks:
      - observability-net

  snmp-simulator:
    image: tandrup/snmpsim
    container_name: obs-snmp-sim
    restart: unless-stopped
    ports:
      - "1161:161/udp"
    networks:
      observability-net:
        ipv4_address: 172.28.0.200

  npm-service:
    build:
      context: ../services/npm
    container_name: obs-npm
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 30000
      HTTP_PORT: 3100
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net

  sql-collector:
    build:
      context: ../services/sql-collector
    container_name: obs-sql-collector
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 60000
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - observability-net

  exec-collector:
    build:
      context: ../services/exec-collector
    container_name: obs-exec-collector
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 60000
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - observability-net

  metrics-consumer:
    build:
      context: ../services/metrics-consumer
    container_name: obs-metrics-consumer
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net

  alarm-engine:
    build:
      context: ../services/alarm-engine
    container_name: obs-alarm-engine
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CHECK_INTERVAL_MS: 20000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - observability-net

  nta-service:
    build:
      context: ../services/nta
    container_name: obs-nta
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NETFLOW_PORT: 2055
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net

  nflow-generator:
    image: networkstatic/nflow-generator
    container_name: obs-nflow-gen
    restart: unless-stopped
    command: ["-t", "nta-service", "-p", "2055"]
    depends_on:
      - nta-service
    networks:
      observability-net:
        ipv4_address: 172.28.0.100

  flows-consumer:
    build:
      context: ../services/flows-consumer
    container_name: obs-flows-consumer
    restart: unless-stopped
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net
