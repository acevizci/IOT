# LOG ROTASYONU (kalici, tasinabilir): Docker varsayilan json-file surucusunun
# rotasyonu YOKTUR -> bir container'in logu sinirsiz buyur (bugun obs-snmp-sim 16GB'a
# ulasip diski doldurdu, Redis yazamayip tum metrik hatti durdu). daemon.json ile
# global olarak da ayarlandi; bu anchor ayni korumayi KOD ICINDE tutar (daemon.json
# kaybolsa/baska makinede deploy edilse bile gecerli). Her servis `<<` degil, dogrudan
# `logging: *default-logging` ile referans verir.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "3"

networks:
  observability-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres-data:
  clickhouse-data:
  redis-data:
  agent-releases-data:

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: obs-postgres
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - observability-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: obs-clickhouse
    logging: *default-logging
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: obs-redis
    logging: *default-logging
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-service:
    build:
      context: ../services/core
    container_name: obs-core
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: observability_flows
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
      EXEC_COLLECTOR_URL: http://exec-collector:3200
      ALARM_ENGINE_URL: http://alarm-engine:3500
      # GÜVENLİK DÜZELTMESİ: agent-releases yayınlama endpoint'i, dosya yolunu artık bu
      # dizinle sınırlıyor (bkz. index.ts AGENT_RELEASES_DIR) -- keyfi sunucu dosyalarının
      # "release" olarak kaydedilip parolasız indirilebilmesini önler. Yeni bir agent
      # binary'si yayınlamadan önce bu volume'a (docker cp veya bind mount ile) kopyalanmalı.
      AGENT_RELEASES_DIR: /var/lib/iot-observability/agent-releases
    volumes:
      - agent-releases-data:/var/lib/iot-observability/agent-releases
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - observability-net

  gateway:
    build:
      context: ../services/gateway
    container_name: obs-gateway
    logging: *default-logging
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      NPM_SERVICE_URL: http://npm-service:3100
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      # GÜVENLİK DÜZELTMESİ: CORS artık herhangi bir Origin'i değil, sadece burada
      # listelenenleri kabul ediyor. Prod'da dashboard'un gerçek adresiyle değiştirin.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://192.168.163.132:5173}
    depends_on:
      - core-service
      - npm-service
    networks:
      - observability-net

  snmp-simulator:
    image: tandrup/snmpsim
    container_name: obs-snmp-sim
    logging: *default-logging
    restart: unless-stopped
    ports:
      - "1161:161/udp"
    networks:
      observability-net:
        ipv4_address: 172.28.0.200

  npm-service:
    build:
      context: ../services/npm
    container_name: obs-npm
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 30000
      HTTP_PORT: 3100
      SYSLOG_PORT: 1514
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CORE_SERVICE_URL: http://core-service:3000
    # Pasif Syslog alıcısı: HTTP API (3100) host'a KAPALI kalır; sadece Syslog UDP
    # port'u host'a açılır ki gerçek ağ cihazları/sunucular buraya log gönderebilsin.
    # Cihazlarda syslog hedefi: <iot01-ip>:1514/udp. (Standart 514 host'ta root/CAP_NET_BIND
    # ister; 1514 kullanıp gerekirse host firewall/NAT ile 514->1514 yönlendirilir.)
    # NOT: SNMP Trap alıcısı (UDP 1162) da AYNI şekilde host'a kapalıdır -- gerçek
    # cihazlardan trap almak istenirse buraya "- 1162:1162/udp" satırı da eklenmeli.
    ports:
      - "1514:1514/udp"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:3100/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  sql-collector:
    build:
      context: ../services/sql-collector
    container_name: obs-sql-collector
    logging: *default-logging
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 60000
      HTTP_PORT: 3300
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:3300/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  exec-collector:
    build:
      context: ../services/exec-collector
    container_name: obs-exec-collector
    logging: *default-logging
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 60000
      HTTP_PORT: 3200
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:3200/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  web-collector:
    build:
      context: ../services/web-collector
    container_name: obs-web-collector
    logging: *default-logging
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 60000
      HTTP_PORT: 3400
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
    depends_on:
      redis:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:3400/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  metrics-consumer:
    build:
      context: ../services/metrics-consumer
    container_name: obs-metrics-consumer
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net

  alarm-engine:
    build:
      context: ../services/alarm-engine
    container_name: obs-alarm-engine
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      CHECK_INTERVAL_MS: 20000
      CORE_SERVICE_URL: http://core-service:3000
      HTTP_PORT: 3500
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:3500/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s

  nta-service:
    build:
      context: ../services/nta
    container_name: obs-nta
    logging: *default-logging
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NETFLOW_PORT: 2055
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net

  nflow-generator:
    image: networkstatic/nflow-generator
    container_name: obs-nflow-gen
    logging: *default-logging
    restart: unless-stopped
    command: ["-t", "nta-service", "-p", "2055"]
    depends_on:
      - nta-service
    networks:
      observability-net:
        ipv4_address: 172.28.0.100

  apm-trace-generator:
    build:
      context: ../services/apm-trace-generator
    container_name: obs-apm-trace-gen
    logging: *default-logging
    restart: unless-stopped
    environment:
      APM_COLLECTOR_URL: http://apm-collector:4318
      APM_GEN_API_TOKEN: ${APM_GEN_API_TOKEN}
      GEN_INTERVAL_MS: 5000
    depends_on:
      - apm-collector
    networks:
      - observability-net

  apm-collector:
    build:
      context: ../services/apm-collector
    container_name: obs-apm-collector
    logging: *default-logging
    restart: unless-stopped
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CORE_SERVICE_URL: http://core-service:3000
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      HTTP_PORT: 4318
    ports:
      - "4318:4318"
      - "4317:4317"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - observability-net

  flows-consumer:
    build:
      context: ../services/flows-consumer
    container_name: obs-flows-consumer
    logging: *default-logging
    restart: unless-stopped
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      REDIS_URL: redis://redis:6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - observability-net

  # FAZ J — TEST AMAÇLI sahte vCenter API sunucusu (SNMP-Sim'in vCenter karşılığı,
  # gerçek bir vCenter/ESXi erişimi olmadığı için vmware-collector'ı test etmek için).
  mock-vcenter:
    image: node:20-alpine
    container_name: obs-mock-vcenter
    logging: *default-logging
    restart: unless-stopped
    volumes:
      - ../scripts/mock-vcenter-server.cjs:/mock-vcenter-server.cjs:ro
    command: ["node", "/mock-vcenter-server.cjs"]
    environment:
      MOCK_VCENTER_PORT: 8443
    networks:
      - observability-net

  vmware-collector:
    build:
      context: ../services/vmware-collector
    container_name: obs-vmware-collector
    logging: *default-logging
    restart: unless-stopped
    environment:
      CORE_SERVICE_URL: http://core-service:3000
      REDIS_URL: redis://redis:6379
      POLL_INTERVAL_MS: 120000
      HTTP_PORT: 3600
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      # TEST AMAÇLI -- SADECE mock-vcenter'a (düz HTTP) bağlanabilmek için. Gerçek bir
      # vCenter'a bağlanmadan önce bu satır SİLİNMELİ (varsayılan: https kullanılır).
      VMWARE_MOCK_HTTP: "true"
    depends_on:
      redis:
        condition: service_healthy
      core-service:
        condition: service_started
    networks:
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "127.0.0.1:3600/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
