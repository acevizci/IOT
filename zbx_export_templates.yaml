        - uuid: 2718e8300eee4e519d79c7a495774070
          name: 'System name'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.5.0
          key: system.name
          delay: 24h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB.
            The administratively-assigned name for this node. By convention, this is the node's fully-qualified domain name. If the name is unknown, the value is a zero-length string.
          inventory_link: NAME
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 6cd6567adbd9495a96d4593b3799747e
              expression: 'change(/WM_Cisco Nexus by SNMP/system.name)=1 and length(last(/WM_Cisco Nexus by SNMP/system.name))>0'
              name: 'System name has changed'
              event_name: 'System name has changed (new name: {ITEM.VALUE})'
              priority: INFO
              description: 'The system name has changed. Acknowledge to close manually.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: 0fcd97564c9e4ba59174f1ebcf0d97d8
          name: 'System object ID'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.2.0
          key: system.objectid
          delay: 24h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB.
            The vendor's authoritative identification of the network management subsystem contained in the entity. This value is allocated within the SMI enterprise's subtree (1.3.6.1.4.1) and provides an easy and unambiguous means for determining "what kind of box" is being managed.
            For example, if the vendor "Flintstones, Inc." was assigned the subtree 1.3.6.1.4.1.4242, it could assign the identifier 1.3.6.1.4.1.4242.1.1 to its "Fred Router".
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1h
          tags:
            - tag: component
              value: system
        - uuid: 27398b0110aa4e5dbf90cd9d64b03cc7
          name: 'Operating system'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.9.9.25.1.1.1.2.5
          key: system.sw.os
          delay: 24h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: 'MIB: CISCO-IMAGE-MIB'
          inventory_link: OS
          preprocessing:
            - type: REGEX
              parameters:
                - 'CW_VERSION\$(.*?)\$'
                - \1
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 9e5724b312444e459ec29bbc3e161df4
              expression: 'change(/WM_Cisco Nexus by SNMP/system.sw.os)=1 and length(last(/WM_Cisco Nexus by SNMP/system.sw.os))>0'
              recovery_mode: NONE
              name: 'Operating system description has changed'
              priority: INFO
              description: 'The description of the operating system has changed. Possible reasons that system has been updated or replaced. Acknowledge to close manually.'
              manual_close: 'YES'
              dependencies:
                - name: 'System name has changed'
                  expression: 'change(/WM_Cisco Nexus by SNMP/system.name)=1 and length(last(/WM_Cisco Nexus by SNMP/system.name))>0'
              tags:
                - tag: scope
                  value: notice
        - uuid: a0977d29ca8f49899da8be255994e5b1
          name: 'Uptime (snmp)'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.6.3.10.2.1.3.0
          key: system.uptime
          history: 7d
          trends: 0d
          units: uptime
          description: |
            MIB: SNMP-FRAMEWORK-MIB::snmpEngineTime.
            The number of seconds since the value of the `snmpEngineBoots` object has had a last change.
            When incrementing this object's value would cause it to exceed its maximum, the `snmpEngineBoots` is incremented as if a re-initialization had occurred,
            and this object's value consequently reverts to zero.
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: b633f26447cc404cb66d5905dfef7f53
              expression: 'last(/WM_Cisco Nexus by SNMP/system.uptime)<10m'
              name: 'Device has been restarted or reinitialized'
              event_name: '{HOST.NAME} has been restarted or reinitialized (uptime < 10m)'
              priority: WARNING
              description: 'The record of SNMP Boots has changed in less than 10 minutes. The restart of a device also counts.'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: fb653a7f10a54a25a1970d82aca46e5c
          name: 'SNMP agent availability'
          type: INTERNAL
          key: 'zabbix[host,snmp,available]'
          history: 7d
          valuemap:
            name: zabbix.host.available
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: a4b1095bce454bd5841c7915229c0521
              expression: 'max(/WM_Cisco Nexus by SNMP/zabbix[host,snmp,available],{$SNMP.TIMEOUT})=0'
              name: 'No SNMP data collection'
              opdata: 'Current state: {ITEM.LASTVALUE1}'
              priority: WARNING
              description: 'SNMP is not available for polling. Check the connectivity of a device and SNMP settings.'
              tags:
                - tag: scope
                  value: availability
      discovery_rules:
        - uuid: e612fa2231834e6780deb1f5e5f2a2c1
          name: 'CPU discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.9.9.109.1.1.1.1.2]'
          key: cpu.discovery
          delay: 1h
          description: |
            You must use CISCO-PROCESS-MIB and its object `cpmCPUTotal5minRev` from the table called `cpmCPUTotalTable`, and indexed with `cpmCPUTotalPhysicalIndex`.
            The table `cpmCPUTotalTable` allows CISCO-PROCESS-MIB to keep the CPU statistics for different physical entities in the router, such as different CPU chips, a group of CPUs, or CPUs in different modules/cards.
            In the case of a single CPU, the `cpmCPUTotalTable` has only one entry.
          item_prototypes:
            - uuid: 825e905c14c849d4908f8a35cabd13d3
              name: '#{#SNMPINDEX}: CPU utilization'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.109.1.1.1.1.8.{#SNMPINDEX}'
              key: 'system.cpu.util[{#SNMPINDEX}]'
              delay: 5m
              history: 7d
              value_type: FLOAT
              units: '%'
              description: |
                MIB: CISCO-PROCESS-MIB
                The object name: `cpmCPUTotal5minRev`
                
                The MIB object `cpmCPUTotal5minRev` provides a more accurate view of the performance of the router over time than the MIB objects `cpmCPUTotal1minRev` and `cpmCPUTotal5secRev`. These MIB objects are not accurate because they look at the CPU with an interval of one minute and five seconds, respectively. These MIBs enable to monitor the trends and plan the capacity of your network. The recommended baseline rising threshold for the `cpmCPUTotal5minRev` is 90 percent. Depending on the platform, some routers that run at 90 percent, for example, 2500 series can exhibit performance degradation versus a high-end router, for example, the 7500 series, which can operate fine.
              tags:
                - tag: component
                  value: cpu
              trigger_prototypes:
                - uuid: 33a1e02957cc4754b1e85c703dd668bf
                  expression: 'min(/WM_Cisco Nexus by SNMP/system.cpu.util[{#SNMPINDEX}],5m)>{$CPU.UTIL.CRIT}'
                  name: '#{#SNMPINDEX}: High CPU utilization'
                  event_name: '#{#SNMPINDEX}: High CPU utilization (over {$CPU.UTIL.CRIT}% for 5m)'
                  opdata: 'Current utilization: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'The CPU utilization is too high. The system might be slow to respond.'
                  tags:
                    - tag: scope
                      value: capacity
                    - tag: scope
                      value: performance
          graph_prototypes:
            - uuid: 1508990de2c444d6baa5efb4d3ab3a80
              name: '#{#SNMPINDEX}: CPU utilization'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 1A7C11
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'system.cpu.util[{#SNMPINDEX}]'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: 8cc584bca4f7403b974be3925454af02
          name: 'Entity serial numbers discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#ENT_CLASS},1.3.6.1.2.1.47.1.1.1.1.5,{#ENT_NAME},1.3.6.1.2.1.47.1.1.1.1.7,{#ENT_SN},1.3.6.1.2.1.47.1.1.1.1.11]'
          key: entity_sn.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#ENT_CLASS}'
                value: '{$ENT_CLASS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: A
              - macro: '{#ENT_SN}'
                value: '{$ENT_SN.MATCHES}'
                formulaid: B
          description: 'The discovery of serial numbers of the entities from ENTITY-MIB.'
          item_prototypes:
            - uuid: df3be87f6a74420dbd84d002363d2bda
              name: '{#ENT_NAME}: Hardware serial number'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.47.1.1.1.1.11.{#SNMPINDEX}'
              key: 'system.hw.serialnumber[{#SNMPINDEX}]'
              delay: 1h
              history: 7d
              trends: '0'
              value_type: CHAR
              description: |
                MIB: ENTITY-MIB.
                The object name: `entPhysicalSerialNum`.
                The vendor-specific serial number string for the physical entity. The preferred value is the serial number string actually printed on the component itself (if present).
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1d
              tags:
                - tag: component
                  value: serial-number
                - tag: entity
                  value: '{#ENT_NAME}'
              trigger_prototypes:
                - uuid: 8d6d90fec857485a8219a0813f2cc895
                  expression: 'change(/WM_Cisco Nexus by SNMP/system.hw.serialnumber[{#SNMPINDEX}])=1 and length(last(/WM_Cisco Nexus by SNMP/system.hw.serialnumber[{#SNMPINDEX}]))>0'
                  name: '{#ENT_NAME}: Device has been replaced'
                  event_name: '{#ENT_NAME}: Device has been replaced (new serial number received)'
                  priority: INFO
                  description: 'The device serial number has changed. Acknowledge to close manually.'
                  tags:
                    - tag: scope
                      value: notice
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: cf8f9d9204084262b32a1d36c028e533
          name: 'Fan status discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.2.1.47.1.1.1.1.7]'
          key: fan.status.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#SNMPVALUE}'
                value: '{$CISCO.LLD.FILTER.FAN.NAME.MATCHES}'
                formulaid: A
          description: 'The discovery of metrics for the fan''s status from ENTITY-MIB and CISCO-ENTITY-FRU-CONTROL-MIB.'
          item_prototypes:
            - uuid: 8aff8d7344ce4210869287f7e444bc9e
              name: '{#SNMPVALUE}: Fan operational status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.117.1.4.1.1.1.{#SNMPINDEX}'
              key: 'sensor.fan.status[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: CISCO-ENTITY-FRU-CONTROL-MIB.
                The object name: `cefcFanTrayOperStatus`.
                The operational state of the fan or a fan tray.
                Possible values:
                -  unknown (1) - unknown;
                -  up (2) - powered on;
                -  down (3) - powered down;
                -  warning (4) - partial failure; needs replacement as soon as possible.
              valuemap:
                name: 'CISCO-ENTITY-FRU-CONTROL-MIB::cefcFanTrayOperStatus'
              tags:
                - tag: component
                  value: fan
              trigger_prototypes:
                - uuid: 4913e0c3b0604ae58644de73bbd27c92
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.fan.status[{#SNMPINDEX}])=3'
                  name: '{#SNMPVALUE}: Fan is down'
                  opdata: 'Current state: {ITEM.LASTVALUE}'
                  priority: AVERAGE
                  description: 'The fan unit requires immediate attention.'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 5dc35e5c69d34425bde13aa7d9a5ee95
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.fan.status[{#SNMPINDEX}])=1'
                  name: '{#SNMPVALUE}: Fan is in unknown state'
                  opdata: 'Current state: {ITEM.LASTVALUE}'
                  priority: INFO
                  description: 'The fan unit requires attention.'
                  dependencies:
                    - name: '{#SNMPVALUE}: Fan is down'
                      expression: 'last(/WM_Cisco Nexus by SNMP/sensor.fan.status[{#SNMPINDEX}])=3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 8e4ee8ba489e48bb9bfd0bb233e85a5f
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.fan.status[{#SNMPINDEX}])=4'
                  name: '{#SNMPVALUE}: Fan is in warning state'
                  opdata: 'Current state: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'The fan unit requires attention.'
                  dependencies:
                    - name: '{#SNMPVALUE}: Fan is down'
                      expression: 'last(/WM_Cisco Nexus by SNMP/sensor.fan.status[{#SNMPINDEX}])=3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: 3bedb7985cfc4fcb8ac6af452a80bc4b
          name: 'Memory discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.4.1.9.9.221.1.1.1.1.3]'
          key: memory.discovery
          delay: 1h
          description: |
            The discovery of `ciscoMemoryPoolTable` - the table that contains monitoring entries of the memory pool.
            For more details see "How to Get Free and Largest Block of Contiguous Memory Using SNMP":
            http://www.cisco.com/c/en/us/support/docs/ip/simple-network-management-protocol-snmp/15216-contiguous-memory.html
          item_prototypes:
            - uuid: 349aea0f585b4a4facfbe12258dc8bee
              name: '{#SNMPVALUE}: Free memory'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.221.1.1.1.1.8.{#SNMPINDEX}'
              key: 'vm.memory.free[{#SNMPINDEX}]'
              history: 7d
              units: B
              description: |
                MIB: CISCO-ENHANCED-MEMPOOL-MIB.
                The object name: `cempMemPoolFree`.
                It indicates the number of bytes from the memory pool that are currently unused on the physical entity.
              tags:
                - tag: component
                  value: memory
                - tag: memory
                  value: '{#SNMPVALUE}'
            - uuid: bbe9dcb7633f4aa38aa819cd4d5103df
              name: '{#SNMPVALUE}: Used memory'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.221.1.1.1.1.7.{#SNMPINDEX}'
              key: 'vm.memory.used[{#SNMPINDEX}]'
              history: 7d
              units: B
              description: |
                MIB: CISCO-ENHANCED-MEMPOOL-MIB.
                The object name: `cempMemPoolUsed`.
                It indicates the number of bytes from the memory pool that are currently in use by applications on the physical entity.
              tags:
                - tag: component
                  value: memory
                - tag: memory
                  value: '{#SNMPVALUE}'
            - uuid: 75dd4969e6ae4060be4fb785b0b4ad22
              name: '{#SNMPVALUE}: Memory utilization'
              type: CALCULATED
              key: 'vm.memory.util[{#SNMPINDEX}]'
              history: 7d
              value_type: FLOAT
              units: '%'
              params: 'last(//vm.memory.used[{#SNMPINDEX}])/(last(//vm.memory.free[{#SNMPINDEX}])+last(//vm.memory.used[{#SNMPINDEX}]))*100'
              description: 'The memory utilization expressed in %.'
              tags:
                - tag: component
                  value: memory
                - tag: memory
                  value: '{#SNMPVALUE}'
              trigger_prototypes:
                - uuid: 2441805da0b54e83ab8b0cf7abd86d92
                  expression: 'min(/WM_Cisco Nexus by SNMP/vm.memory.util[{#SNMPINDEX}],5m)>{$MEMORY.UTIL.MAX}'
                  name: '{#SNMPVALUE}: High memory utilization'
                  event_name: '{#SNMPVALUE}: High memory utilization ( >{$MEMORY.UTIL.MAX}% for 5m)'
                  priority: AVERAGE
                  description: 'The system is running out of free memory.'
                  tags:
                    - tag: scope
                      value: capacity
                    - tag: scope
                      value: performance
          graph_prototypes:
            - uuid: 3deebb099afd436db8b0d98764b53a25
              name: '{#SNMPVALUE}: Memory utilization'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 1A7C11
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'vm.memory.util[{#SNMPINDEX}]'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: c948b95dd1ca45ad995dbb8faf410c04
          name: 'Network interfaces discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#IFOPERSTATUS},1.3.6.1.2.1.2.2.1.8,{#IFADMINSTATUS},1.3.6.1.2.1.2.2.1.7,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1,{#IFDESCR},1.3.6.1.2.1.2.2.1.2,{#IFTYPE},1.3.6.1.2.1.2.2.1.3]'
          key: net.if.discovery
          delay: 1h
          filter:
            evaltype: AND
            conditions:
              - macro: '{#IFADMINSTATUS}'
                value: '{$NET.IF.IFADMINSTATUS.MATCHES}'
                formulaid: A
              - macro: '{#IFADMINSTATUS}'
                value: '{$NET.IF.IFADMINSTATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: B
              - macro: '{#IFALIAS}'
                value: '{$NET.IF.IFALIAS.MATCHES}'
                formulaid: C
              - macro: '{#IFALIAS}'
                value: '{$NET.IF.IFALIAS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: D
              - macro: '{#IFDESCR}'
                value: '{$NET.IF.IFDESCR.MATCHES}'
                formulaid: E
              - macro: '{#IFDESCR}'
                value: '{$NET.IF.IFDESCR.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: F
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.MATCHES}'
                formulaid: G
              - macro: '{#IFNAME}'
                value: '{$NET.IF.IFNAME.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: H
              - macro: '{#IFOPERSTATUS}'
                value: '{$NET.IF.IFOPERSTATUS.MATCHES}'
                formulaid: I
              - macro: '{#IFOPERSTATUS}'
                value: '{$NET.IF.IFOPERSTATUS.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: J
              - macro: '{#IFTYPE}'
                value: '{$NET.IF.IFTYPE.MATCHES}'
                formulaid: K
              - macro: '{#IFTYPE}'
                value: '{$NET.IF.IFTYPE.NOT_MATCHES}'
                operator: NOT_MATCHES_REGEX
                formulaid: L
          description: 'The discovery of interfaces from IF-MIB.'
          item_prototypes:
            - uuid: bd79ea2771f54e52bbebbbf55cc9deaa
              name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets discarded'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.13.{#SNMPINDEX}'
              key: 'net.if.in.discards[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: IF-MIB.
                The number of inbound packets, which were chosen to be discarded even though no errors had been detected to prevent their being deliverable to a higher-layer protocol.
                One possible reason for discarding such a packet could be the necessity to free up the buffer space.
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of the ifCounterDiscontinuityTime.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 44aed160392e4b0287313349936532ff
              name: 'Interface {#IFNAME}({#IFALIAS}): Inbound packets with errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.14.{#SNMPINDEX}'
              key: 'net.if.in.errors[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: IF-MIB.
                For packet-oriented interfaces, the number of inbound packets that contained errors preventing them from being deliverable to a higher-layer protocol.
                For character-oriented or fixed-length interfaces, the number of inbound transmission units that contained errors preventing them from being deliverable to a higher-layer protocol.
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of the ifCounterDiscontinuityTime.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 56c26009ec5042b380c09de589642eb9
                  expression: 'min(/WM_Cisco Nexus by SNMP/net.if.in.errors[{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/WM_Cisco Nexus by SNMP/net.if.in.errors[{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8'
                  name: 'Interface {#IFNAME}({#IFALIAS}): High input error rate'
                  event_name: 'Interface {#IFNAME}({#IFALIAS}): High input error rate ( > {$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
                  opdata: 'errors in: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'It recovers when it goes below 80% of the {$IF.ERRORS.WARN:"{#IFNAME}"} threshold.'
                  dependencies:
                    - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                      expression: |
                        {$IFCONTROL:"{#IFNAME}"}=1 
                        and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2 
                        and change(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])
                  tags:
                    - tag: scope
                      value: performance
            - uuid: 9555bd89ac2941d69d7b630635027777
              name: 'Interface {#IFNAME}({#IFALIAS}): Bits received'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.6.{#SNMPINDEX}'
              key: 'net.if.in[{#SNMPINDEX}]'
              history: 7d
              units: bps
              description: |
                MIB: IF-MIB.
                The total number of octets received on the interface, including framing characters. This object is a 64-bit version of ifInOctets.
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of the ifCounterDiscontinuityTime.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 3cbe63a176a04451bcc15ae5a76e2a0c
              name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets discarded'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.19.{#SNMPINDEX}'
              key: 'net.if.out.discards[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: IF-MIB.
                The number of outbound packets, which were chosen to be discarded, even though no errors had been detected to prevent their being deliverable to a higher-layer protocol.
                One possible reason for discarding such a packet could be to free up buffer space.
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of the ifCounterDiscontinuityTime.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: bbe6b20afacb4e1cba02e2090e4f111f
              name: 'Interface {#IFNAME}({#IFALIAS}): Outbound packets with errors'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.20.{#SNMPINDEX}'
              key: 'net.if.out.errors[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: IF-MIB.
                For packet-oriented interfaces, the number of outbound packets that contained errors preventing them from being deliverable to a higher-layer protocol.
                For character-oriented or fixed-length interfaces, the number of outbound transmission units that contained errors preventing them from being deliverable to a higher-layer protocol.
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of the ifCounterDiscontinuityTime.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 71faf479a7cd46d6b8c87b01099f70e9
                  expression: 'min(/WM_Cisco Nexus by SNMP/net.if.out.errors[{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/WM_Cisco Nexus by SNMP/net.if.out.errors[{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8'
                  name: 'Interface {#IFNAME}({#IFALIAS}): High output error rate'
                  event_name: 'Interface {#IFNAME}({#IFALIAS}): High output error rate ( > {$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
                  opdata: 'errors out: {ITEM.LASTVALUE2}'
                  priority: WARNING
                  description: 'It recovers when it goes below 80% of the {$IF.ERRORS.WARN:"{#IFNAME}"} threshold.'
                  dependencies:
                    - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                      expression: |
                        {$IFCONTROL:"{#IFNAME}"}=1 
                        and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2 
                        and change(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])
                  tags:
                    - tag: scope
                      value: performance
            - uuid: 9126c0b05fdd4edfa24a204dacfcde33
              name: 'Interface {#IFNAME}({#IFALIAS}): Bits sent'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.10.{#SNMPINDEX}'
              key: 'net.if.out[{#SNMPINDEX}]'
              history: 7d
              units: bps
              description: |
                MIB: IF-MIB.
                The total number of octets transmitted out of the interface, including framing characters. This object is a 64-bit version of the ifOutOctets.
                Discontinuities in the value of this counter can occur at re-initialization of the management system, and at other times as indicated by the value of the ifCounterDiscontinuityTime.
              preprocessing:
                - type: CHANGE_PER_SECOND
                  parameters:
                    - ''
                - type: MULTIPLIER
                  parameters:
                    - '8'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 41369680d4104b02b32d6ef2890ea0e7
              name: 'Interface {#IFNAME}({#IFALIAS}): Speed'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}'
              key: 'net.if.speed[{#SNMPINDEX}]'
              history: 7d
              units: bps
              description: |
                MIB: IF-MIB.
                An estimate of the interface's current bandwidth in units of 1,000,000 bits per second. If this object reports a value of "n", then the speed of the interface is somewhere in the range from n-500,000 to n+499,999.
                For the interfaces, which do not vary in bandwidth or for those where no accurate estimation can be made, this object should contain the nominal bandwidth.
                For a sub-layer, which has no concept of bandwidth, this object should be zero.
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '1000000'
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
            - uuid: 6c163135286346d9b2026a20adb494e8
              name: 'Interface {#IFNAME}({#IFALIAS}): Operational status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}'
              key: 'net.if.status[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: IF-MIB.
                The current operational state of the interface:
                -  The testing (3) state indicates that no operational packet scan be passed.
                -  If ifAdminStatus is down (2), then ifOperStatus should be down (2).
                -  If ifAdminStatus is changed to up (1), then ifOperStatus should change to up (1), provided the interface is ready to transmit and receive network traffic.
                -  It should change to dormant (5) if the interface is waiting for external actions, such as a serial line waiting for an incoming connection.
                -  It should remain in the down (2) state if and only when there is a fault that prevents it from going to the up (1) state.
                -  It should remain in the notPresent (6) state if the interface has missing components (typically, hardware).
              valuemap:
                name: 'IF-MIB::ifOperStatus'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 51b30915b9eb49dab03e51480196cd2d
                  expression: |
                    {$IFCONTROL:"{#IFNAME}"}=1 
                    and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2 
                    and change(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])
                  name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                  opdata: 'Current state: {ITEM.LASTVALUE1}'
                  priority: AVERAGE
                  description: |
                    This trigger expression works as follows:
                    1. Can be triggered if operations status is down.
                    2. Use $IFCONTROL macro with context "{#IFNAME}" to void trigger firing on specific interfaces. Values:
                    -  0 : Marks an interface as not important. Trigger does not fire when interface is down.
                    -  1 : Default value to fire the trigger when interface is down
                    3. change(//net.if.status[{#IFNAME}]) - condition prevents firing of trigger if status did not change. It helps in cases, when interfaces were initially down.
                    BEWARE, manual close will ceasefire until at least two status changes happens again!
                  tags:
                    - tag: scope
                      value: availability
            - uuid: 7bf737cb36bb4ff199b476236c209e09
              name: 'Interface {#IFNAME}({#IFALIAS}): Interface type'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}'
              key: 'net.if.type[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: IF-MIB.
                The type of an interface.
                Additional values for ifType are assigned by the Internet Assigned Numbers Authority (IANA)
                through updating the syntax of the IANAifType textual convention.
              valuemap:
                name: 'IF-MIB::ifType'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 6h
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
          trigger_prototypes:
            - uuid: 4dfd4477109d4b38b00c5c7467a0c35d
              expression: |
                change(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])<0 
                and last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])>0 
                and find(/WM_Cisco Nexus by SNMP/net.if.type[{#SNMPINDEX}],#1,"regexp","^(6|7|11|62|69|117)$") 
                and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])<>2
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: |
                (change(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])>0 and last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}],#2)>0)
                or last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2
              name: 'Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed than it was before'
              opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
              priority: INFO
              description: 'This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of issues with autonegotiation. Ack to close manually.'
              dependencies:
                - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                  expression: |
                    {$IFCONTROL:"{#IFNAME}"}=1 
                    and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2 
                    and change(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])
              tags:
                - tag: scope
                  value: performance
            - uuid: dd975f3862b349c683a9f6e59b13a44e
              expression: |
                (avg(/WM_Cisco Nexus by SNMP/net.if.in[{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])) and
                last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/WM_Cisco Nexus by SNMP/net.if.in[{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])'
              name: 'Interface {#IFNAME}({#IFALIAS}): High inbound bandwidth usage'
              event_name: 'Interface {#IFNAME}({#IFALIAS}): High inbound bandwidth usage ( > {$IF.UTIL.MAX:"{#IFNAME}"}% )'
              opdata: 'In: {ITEM.LASTVALUE1}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              dependencies:
                - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                  expression: |
                    {$IFCONTROL:"{#IFNAME}"}=1 
                    and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2 
                    and change(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])
              tags:
                - tag: scope
                  value: performance
            - uuid: e957954d8173403a8476d209d894cc53
              expression: |
                (avg(/WM_Cisco Nexus by SNMP/net.if.out[{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])) and
                last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])>0
              recovery_mode: RECOVERY_EXPRESSION
              recovery_expression: 'avg(/WM_Cisco Nexus by SNMP/net.if.out[{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/WM_Cisco Nexus by SNMP/net.if.speed[{#SNMPINDEX}])'
              name: 'Interface {#IFNAME}({#IFALIAS}): High outbound bandwidth usage'
              event_name: 'Interface {#IFNAME}({#IFALIAS}): High outbound bandwidth usage ( > {$IF.UTIL.MAX:"{#IFNAME}"}% )'
              opdata: 'Out: {ITEM.LASTVALUE1}, speed: {ITEM.LASTVALUE2}'
              priority: WARNING
              description: 'The utilization of the network interface is close to its estimated maximum bandwidth.'
              dependencies:
                - name: 'Interface {#IFNAME}({#IFALIAS}): Link down'
                  expression: |
                    {$IFCONTROL:"{#IFNAME}"}=1 
                    and last(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])=2 
                    and change(/WM_Cisco Nexus by SNMP/net.if.status[{#SNMPINDEX}])
              tags:
                - tag: scope
                  value: performance
          graph_prototypes:
            - uuid: 4120effd7301428c921c855120abe9e6
              name: 'Interface {#IFNAME}({#IFALIAS}): Network traffic'
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 1A7C11
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'net.if.in[{#SNMPINDEX}]'
                - sortorder: '1'
                  drawtype: BOLD_LINE
                  color: 2774A4
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'net.if.out[{#SNMPINDEX}]'
                - sortorder: '2'
                  color: F63100
                  yaxisside: RIGHT
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'net.if.out.errors[{#SNMPINDEX}]'
                - sortorder: '3'
                  color: A54F10
                  yaxisside: RIGHT
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'net.if.in.errors[{#SNMPINDEX}]'
                - sortorder: '4'
                  color: FC6EA3
                  yaxisside: RIGHT
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'net.if.out.discards[{#SNMPINDEX}]'
                - sortorder: '5'
                  color: 6C59DC
                  yaxisside: RIGHT
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'net.if.in.discards[{#SNMPINDEX}]'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: 91547871bf154be99b395c2cfce2ed92
          name: 'EtherLike discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.2.1.10.7.2.1.19,{#IFOPERSTATUS},1.3.6.1.2.1.2.2.1.8,{#IFALIAS},1.3.6.1.2.1.31.1.1.1.18,{#IFNAME},1.3.6.1.2.1.31.1.1.1.1,{#IFDESCR},1.3.6.1.2.1.2.2.1.2]'
          key: net.if.duplex.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#IFOPERSTATUS}'
                value: '1'
                formulaid: A
              - macro: '{#SNMPVALUE}'
                value: (2|3)
                formulaid: B
          description: 'The discovery of interfaces from IF-MIB and EtherLike-MIB. The interfaces that have up (1) operational status are discovered.'
          item_prototypes:
            - uuid: 7320a92b22db49b6a2c27edf07d99c16
              name: 'Interface {#IFNAME}({#IFALIAS}): Duplex status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.2.1.10.7.2.1.19.{#SNMPINDEX}'
              key: 'net.if.duplex[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: EtherLike-MIB.
                The object name: dot3StatsDuplexStatus.
                The current mode of operation of the MAC entity 'unknown' indicates that the current duplex mode could not be determined.
                The management control of the duplex mode is accomplished through the MAU MIB. 
                When the interface does not support autonegotiation, or when autonegotiation is not enabled, the duplex mode is controlled using ifMauDefaultType.
                When autonegotiation is supported and enabled, duplex mode is controlled using ifMauAutoNegAdvertisedBits.
                In either case, the currently operating duplex mode is reflected in both: in this object and in ifMauType.
                Note that this object provides redundant information with ifMauType.
                Normally, redundant objects are discouraged. 
                However, in this instance, it allows the management application to determine the duplex status of an interface without having to know every possible value of ifMauType.
                This was felt to be sufficiently valuable to justify the redundancy.
                For the reference see: [IEEE 802.3 Std.], 30.3.1.1.32, aDuplexStatus.
              valuemap:
                name: 'EtherLike-MIB::dot3StatsDuplexStatus'
              tags:
                - tag: component
                  value: network
                - tag: description
                  value: '{#IFALIAS}'
                - tag: interface
                  value: '{#IFNAME}'
              trigger_prototypes:
                - uuid: 1562715ec0034dfd92d46ca00ca835f2
                  expression: 'last(/WM_Cisco Nexus by SNMP/net.if.duplex[{#SNMPINDEX}])=2'
                  name: 'Interface {#IFNAME}({#IFALIAS}): In half-duplex mode'
                  priority: WARNING
                  description: 'Check the autonegotiation settings and cabling.'
                  tags:
                    - tag: scope
                      value: performance
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var data = JSON.parse(value);
                  }
                  catch (error) {
                      throw 'Failed to parse JSON of EtherLike-MIB discovery.';
                  }
                  var fields = ['{#SNMPVALUE}','{#IFOPERSTATUS}','{#IFALIAS}','{#IFNAME}','{#IFDESCR}'];
                  data.forEach(function (element) {
                      fields.forEach(function (field) {
                          element[field] = typeof(element[field]) === 'undefined' ? '' : element[field];
                      });
                  });
                  return JSON.stringify(data);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: 2a018f4dbd6048b49381db2e91105765
          name: 'PSU discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SNMPVALUE},1.3.6.1.2.1.47.1.1.1.1.7]'
          key: psu.discovery
          delay: 1h
          filter:
            conditions:
              - macro: '{#SNMPVALUE}'
                value: '{$CISCO.LLD.FILTER.PSU.NAME.MATCHES}'
                formulaid: A
          description: 'The discovery of power supplies from ENTITY-MIB and CISCO-ENTITY-FRU-CONTROL-MIB.'
          item_prototypes:
            - uuid: c26ce1a8c56846499ba85eb2775fa9f3
              name: '{#SNMPVALUE}: Power supply status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.117.1.1.2.1.2.{#SNMPINDEX}'
              key: 'sensor.psu.status[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: CISCO-ENTITY-FRU-CONTROL-MIB.
                The object name: cefcFRUPowerOperStatus.
                The Operational field-replaceable unit (FRU) Status types.
                The valid values are:
                -  offEnvOther (1): FRU is powered off because of a problem not listed below;
                -  on (2): FRU is powered on;
                -  offAdmin (3): administratively off;
                -  offDenied (4): FRU is powered off because available system power is insufficient;
                -  offEnvPower (5): FRU is powered off because of a power problem in the FRU. For example, the FRU's power translation (DC-DC converter) or distribution failed;
                -  offEnvTemp (6): FRU is powered off because of temperature problem;
                -  offEnvFan (7): FRU is powered off because of fan problems;
                -  failed (8): FRU is in failed state;
                -  onButFanFail (9): FRU is on but fan has failed;
                -  offCooling (10): FRU is powered off because of the system's insufficient cooling capacity;
                -  offConnectorRating (11): FRU is powered off because of the system's connector rating exceeded;
                -  onButInlinePowerFail (12): The FRU is on but no inline power is being delivered as the data/inline power component of the FRU has failed.
              valuemap:
                name: 'CISCO-ENTITY-FRU-CONTROL-MIB::cefcFRUPowerOperStatus'
              tags:
                - tag: component
                  value: power
              trigger_prototypes:
                - uuid: e8e8c3045ac048789aeb9d53f13a16d4
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.psu.status[{#SNMPINDEX}])=8'
                  name: '{#SNMPVALUE}: PSU is in failed state'
                  opdata: 'Current state: {ITEM.LASTVALUE}'
                  priority: HIGH
                  description: 'The FRU is in a failed state.'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: cf0538c9671c4cbb96e85bbbbe7d6605
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.psu.status[{#SNMPINDEX}])=3'
                  name: '{#SNMPVALUE}: PSU is off: Administratively'
                  opdata: 'Current state: {ITEM.LASTVALUE}'
                  priority: INFO
                  description: 'The FRU is administratively off.'
                  dependencies:
                    - name: '{#SNMPVALUE}: PSU is in failed state'
                      expression: 'last(/WM_Cisco Nexus by SNMP/sensor.psu.status[{#SNMPINDEX}])=8'
                  tags:
                    - tag: scope
                      value: availability
                - uuid: de349ca4de1f47838dce35ab227c1ee0
                  expression: 'find(/WM_Cisco Nexus by SNMP/sensor.psu.status[{#SNMPINDEX}],#1,"regexp",{$PSU.PROBLEM.STATES})'
                  name: '{#SNMPVALUE}: PSU is off or out of optimal state'
                  opdata: 'Current state: {ITEM.LASTVALUE}'
                  priority: AVERAGE
                  description: |
                    The PSU requires attention. Compare the current state from operational data with the table below:
                    -  offEnvOther (1): FRU is powered off because of a problem not listed below;
                    -  on (2): FRU is powered on;
                    -  offAdmin (3): administratively off;
                    -  offDenied (4): FRU is powered off because available system power is insufficient;
                    -  offEnvPower (5): FRU is powered off because of a power problem in the FRU. For example, the FRU's power translation (DC-DC converter) or distribution failed;
                    -  offEnvTemp (6): FRU is powered off because of temperature problem;
                    -  offEnvFan (7): FRU is powered off because of fan problems;
                    -  failed (8): FRU is in failed state;
                    -  onButFanFail (9): FRU is on but fan has failed;
                    -  offCooling (10): FRU is powered off because of the system's insufficient cooling capacity;
                    -  offConnectorRating (11): FRU is powered off because of the system's connector rating exceeded;
                    -  onButInlinePowerFail (12): The FRU is on but no inline power is being delivered as the data/inline power component of the FRU has failed.
                  dependencies:
                    - name: '{#SNMPVALUE}: PSU is in failed state'
                      expression: 'last(/WM_Cisco Nexus by SNMP/sensor.psu.status[{#SNMPINDEX}])=8'
                  tags:
                    - tag: scope
                      value: availability
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
        - uuid: a1ca784af6384799b1c5ef771e32bd2b
          name: 'Temperature sensors discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#SENSOR_TYPE},1.3.6.1.4.1.9.9.91.1.1.1.1.1,{#SENSOR_SCALE},1.3.6.1.4.1.9.9.91.1.1.1.1.2,{#SNMPVALUE},1.3.6.1.2.1.47.1.1.1.1.7]'
          key: temperature.discovery
          delay: 1h
          status: DISABLED
          description: 'The discovery of temperature sensors from CISCO-ENTITY-SENSOR-MIB and ENTITY-MIB. The sensors that have celsius (8) `entSensorType` are discovered. The scale of gathered values is taken from the `entSensorScale` and applied in item preprocessing.'
          item_prototypes:
            - uuid: d5b0336afb784f75bddca376681c8380
              name: '{#SNMPVALUE}: Temperature sensor status'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.91.1.1.1.1.5.{#SNMPINDEX}'
              key: 'sensor.temp.status[{#SNMPINDEX}]'
              history: 7d
              description: |
                MIB: CISCO-ENTITY-SENSOR-MIB.
                The object name: entSensorStatus.
                This variable indicates the present operational status of the sensor.
                Possible values:
                -  ok (1): means the agent can read the sensor value;
                -  unavailable (2): means that the agent presently can not report the sensor value;
                -  nonoperational (3) means that the agent believes the sensor is broken. The sensor could have a hard failure (e.g., disconnected wire), or a soft failure (e.g., out-of-range, jittery, or wildly fluctuating readings).
              valuemap:
                name: 'CISCO-ENTITY-SENSOR-MIB::entSensorStatus'
              tags:
                - tag: component
                  value: temperature
                - tag: sensor
                  value: '{#SNMPVALUE}'
              trigger_prototypes:
                - uuid: 851f3173c1684ee69ac14a1f1046cf23
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.temp.status[{#SNMPINDEX}])=2'
                  name: '{#SNMPVALUE}: Temperature sensor is not available'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'It means that the agent presently can not report the sensor value.'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: df4ad9e081de416ab66f1c724962157a
                  expression: 'last(/WM_Cisco Nexus by SNMP/sensor.temp.status[{#SNMPINDEX}])=3'
                  name: '{#SNMPVALUE}: Temperature sensor is not operational'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: HIGH
                  description: 'It means that the agent considers that the sensor is broken. The sensor could have a hard failure (e.g., disconnected wire), or a soft failure (e.g., out-of-range, jittery, or wildly fluctuating readings).'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: 45fd09f86216463c90cc500e34a645c3
              name: '{#SNMPVALUE}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.91.1.1.1.1.4.{#SNMPINDEX}'
              key: 'sensor.temp.value[{#SNMPINDEX}]'
              history: 7d
              value_type: FLOAT
              units: '!°C'
              description: |
                MIB: CISCO-ENTITY-SENSOR-MIB.
                The object name: entSensorValue.
                This variable reports the most recent measurement seen by the sensor.
              preprocessing:
                - type: MULTIPLIER
                  parameters:
                    - '{#SENSOR_SCALE}'
              tags:
                - tag: component
                  value: temperature
                - tag: sensor
                  value: '{#SNMPVALUE}'
              trigger_prototypes:
                - uuid: 47a1d70c8f5d4c0d849de32abd362e21
                  expression: 'avg(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_CRIT:"{#SNMPVALUE}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_CRIT:"{#SNMPVALUE}"}-3'
                  name: '{#SNMPVALUE}: Temperature is above critical threshold'
                  event_name: '{#SNMPVALUE}: Temperature is above critical threshold: >{$TEMP_CRIT:"{#SNMPVALUE}"}°C'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: HIGH
                  description: 'This trigger uses the values of the temperature sensor.'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 43f32367afa848a592bdac8ab041298c
                  expression: 'avg(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_WARN:"{#SNMPVALUE}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_WARN:"{#SNMPVALUE}"}-3'
                  name: '{#SNMPVALUE}: Temperature is above warning threshold'
                  event_name: '{#SNMPVALUE}: Temperature is above warning threshold: >{$TEMP_WARN:"{#SNMPVALUE}°C"}'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'This trigger uses the values of the temperature sensor.'
                  dependencies:
                    - name: '{#SNMPVALUE}: Temperature is above critical threshold'
                      expression: 'avg(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_CRIT:"{#SNMPVALUE}"}'
                      recovery_expression: 'max(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_CRIT:"{#SNMPVALUE}"}-3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 0da37cfe915b44898a44202bd2b80f64
                  expression: 'avg(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_CRIT_LOW:"{#SNMPVALUE}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'min(/WM_Cisco Nexus by SNMP/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_CRIT_LOW:"{#SNMPVALUE}"}-3'
                  name: '{#SNMPVALUE}: Temperature is too low'
                  event_name: '{#SNMPVALUE}: Temperature is too low: <{$TEMP_CRIT_LOW:"{#SNMPVALUE}°C"}'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: AVERAGE
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          graph_prototypes:
            - uuid: fb38a9318e6640ea82d23bb8d6d45efd
              name: '{#SNMPVALUE}: Temperature'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 1A7C11
                  item:
                    host: 'WM_Cisco Nexus by SNMP'
                    key: 'sensor.temp.value[{#SNMPINDEX}]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var sensors = JSON.parse(value);
                  } catch (e) {
                      throw "Failed to parse JSON of temperature discovery.";
                  }
                  
                  var scales = {'9': 1, '8': 0.001, '7': 0.000001};
                  var result = sensors.filter(function (sensor) {      
                      if (sensor['{#SENSOR_TYPE}'] !== '8' || typeof(scales[sensor['{#SENSOR_SCALE}']]) === 'undefined') {
                          return false;
                      }
                      sensor['{#SENSOR_SCALE}'] = scales[sensor['{#SENSOR_SCALE}']];
                      return true;
                  });
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
