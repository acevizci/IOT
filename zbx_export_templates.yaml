    - uuid: 27b4041918e148cf8b380962132408dc
      template: 'WM_Cisco Nexus by SNMP'
      name: 'WM_Cisco Nexus by SNMP'
      description: |
        Template Cisco Nexus 9000 Series
          
          MIBs used:
          CISCO-ENHANCED-MEMPOOL-MIB
          CISCO-ENTITY-FRU-CONTROL-MIB
          CISCO-ENTITY-SENSOR-MIB
          CISCO-PROCESS-MIB
          ENTITY-MIB
          EtherLike-MIB
          IF-MIB
          SNMPv2-MIB
          SNMP-FRAMEWORK-MIB
          CISCO-IMAGE-MIB
        
        You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/418396-discussion-thread-for-official-zabbix-templates-for-cisco
        
        Template tooling version used: 0.41
      groups:
        - name: HG_Kenar_Switch
      items:
        - uuid: 7f6cfd560ac04ae78795b270dbb5ee6f
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 7d
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: e4fce940416e44648d9bca0fad7ce1c6
              expression: 'max(/WM_Cisco Nexus by SNMP/icmpping,#3)=0'
              name: 'Unavailable by ICMP ping'
              priority: HIGH
              description: 'The last three attempts returned a timeout. Check the connectivity of a device.'
              tags:
                - tag: scope
                  value: availability
        - uuid: 845656b6b7aa4cf3a8ff10033bf99a21
          name: 'ICMP loss'
          type: SIMPLE
          key: icmppingloss
          history: 7d
          value_type: FLOAT
          units: '%'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: b9dffbf4a60b49a3af856fc8eaebf6b1
              expression: 'min(/WM_Cisco Nexus by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/WM_Cisco Nexus by SNMP/icmppingloss,5m)<100'
              name: 'High ICMP ping loss'
              opdata: 'Loss: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/WM_Cisco Nexus by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: d2aecfd1c0154aaaa0a4f280faf76795
          name: 'ICMP response time'
          type: SIMPLE
          key: icmppingsec
          history: 7d
          value_type: FLOAT
          units: s
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 5113bf71da1d48debf097168bf3a58d0
              expression: 'avg(/WM_Cisco Nexus by SNMP/icmppingsec,5m)>{$ICMP_RESPONSE_TIME_WARN}'
              name: 'High ICMP ping response time'
              opdata: 'Value: {ITEM.LASTVALUE1}'
              priority: WARNING
              dependencies:
                - name: 'High ICMP ping loss'
                  expression: 'min(/WM_Cisco Nexus by SNMP/icmppingloss,5m)>{$ICMP_LOSS_WARN} and min(/WM_Cisco Nexus by SNMP/icmppingloss,5m)<100'
                - name: 'Unavailable by ICMP ping'
                  expression: 'max(/WM_Cisco Nexus by SNMP/icmpping,#3)=0'
              tags:
                - tag: scope
                  value: availability
                - tag: scope
                  value: performance
        - uuid: 012343bd5d18423584b55607cb59e2ee
          name: 'SNMP traps (fallback)'
          type: SNMP_TRAP
          key: snmptrap.fallback
          history: 7d
          trends: '0'
          value_type: LOG
          description: 'The item is used to collect all the SNMP traps unmatched by the other snmptrap items.'
          logtimefmt: 'hh:mm:sszyyyy/MM/dd'
          tags:
            - tag: component
              value: system
        - uuid: 55521d1253824786a145dfe6c02c8c1c
          name: 'System contact details'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.4.0
          key: system.contact
          delay: 24h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB.
            The textual identification of the contact person for the managed node (or: this node), together with the contact information of this person. If no contact information is known, the value is a zero-length string.
          inventory_link: CONTACT
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: c9421ccbeebc48db9ef9c7ea8e3911be
          name: 'System description'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.2.1.1.1.0
          key: system.descr
          delay: 24h
          history: 7d
          trends: '0'
          value_type: CHAR
          description: |
            MIB: SNMPv2-MIB.
            The textual description of the entity. This value should include the full name and version identification number of the system's hardware type, software operating-system, and the networking software.
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
