      template: 'LDAP Service'
      name: 'LDAP Service'
      description: |
        Template module for monitoring LDAP service
        
        Template tooling version used: 0.41
      groups:
        - name: 'DC Linux Servers'
      items:
        - uuid: a0d19592dc5b4ab49240fc7d6101a459
          name: 'LDAP service is running'
          type: SIMPLE
          key: 'net.tcp.service[ldap]'
          history: 1w
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: network
          triggers:
            - uuid: ea88df0a4c87424c891ac2197e5b6966
              expression: 'max(/LDAP Service/net.tcp.service[ldap],#3)=0'
              name: 'LDAP service is down on {HOST.NAME}'
              priority: AVERAGE
              tags:
                - tag: scope
                  value: availability
      valuemaps:
        - uuid: ddbdab3aa88f4ad0b331a65504cceca5
          name: 'Service state'
          mappings:
            - value: '0'
              newvalue: Down
            - value: '1'
              newvalue: Up
    - uuid: e64cacf23acb4f0ebdbae21878d5ae19
      template: 'Linux by Zabbix agent MMC'
      name: 'Linux by Zabbix agent MMC'
      description: |
        Official Linux template. Requires agent of Zabbix 3.0.14, 3.4.5 and 4.0.0 or newer.
        
        Known Issues:
        
          Description: Network discovery. Zabbix agent as of 4.2 doesn't support items such as net.if.status, net.if.speed.
        
        You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback/387225-discussion-thread-for-official-zabbix-template-for-linux
        
        Template tooling version used: 0.41
      groups:
        - name: HG_MMC
      items:
        - uuid: d741fc8d875d4837a5a081877e2830fd
          name: 'Host name of Zabbix agent running'
          type: ZABBIX_ACTIVE
          key: agent.hostname
          delay: 50m
          history: 7d
          trends: '0'
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
        - uuid: b598286a855d442b8a7fb969b34e0f03
          name: 'Zabbix agent ping'
          type: ZABBIX_ACTIVE
          key: agent.ping
          delay: 50m
          history: 7d
          trends: 7d
          description: 'The agent always returns 1 for this item. It could be used in combination with nodata() for availability check.'
          valuemap:
            name: 'Zabbix agent ping status'
          tags:
            - tag: component
              value: system
        - uuid: 8aff3bf094514c4f8354be7c1c924b22
          name: 'Version of Zabbix agent running'
          key: agent.version
          delay: 50m
          history: 7d
          trends: '0'
          status: DISABLED
          value_type: CHAR
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: application
        - uuid: 068ff54569ab42c08e035ce83bbb8aec
          name: 'Maximum number of open file descriptors'
          type: ZABBIX_ACTIVE
          key: kernel.maxfiles
          delay: 50m
          history: 7d
          trends: 7d
          description: 'It could be increased by using sysctl utility or modifying file /etc/sysctl.conf.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: f833d4dfc06d4587b7c0cd6a1baa2487
              expression: 'last(/Linux by Zabbix agent MMC/kernel.maxfiles)<{$KERNEL.MAXFILES.MIN}'
              name: 'Configured max number of open filedescriptors is too low'
              event_name: 'Configured max number of open filedescriptors is too low (< {$KERNEL.MAXFILES.MIN})'
              status: DISABLED
              priority: INFO
              tags:
                - tag: scope
                  value: performance
        - uuid: 94d47468040b4d5aa6ba213396a8c88a
          name: 'Maximum number of processes'
          type: ZABBIX_ACTIVE
          key: kernel.maxproc
          delay: 50m
          history: 7d
          trends: 7d
          description: 'It could be increased by using sysctl utility or modifying file /etc/sysctl.conf.'
          preprocessing:
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 1d
          tags:
            - tag: component
              value: system
          triggers:
            - uuid: 9332c4ca90904374aed9148a75d3ec7f
              expression: 'last(/Linux by Zabbix agent MMC/kernel.maxproc)<{$KERNEL.MAXPROC.MIN}'
