              expression: 'last(/F5 Big-IP by SNMP_Custom/bigip.serialnumber,#1)<>last(/F5 Big-IP by SNMP_Custom/bigip.serialnumber,#2) and length(last(/F5 Big-IP by SNMP_Custom/bigip.serialnumber))>0'
              name: 'F5 BIG-IP: Chassis has been replaced'
