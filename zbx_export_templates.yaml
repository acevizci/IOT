              expression: 'count(/Template_Cisco_Traps/snmptrap["bgpPeerState|cbgpPeer2State"],10m,"like","idle")>0 and nodata(/Template_Cisco_Traps/snmptrap["bgpPeerState|cbgpPeer2State"],10m)=0'
