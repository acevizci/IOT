        - uuid: 0821fa19176b4e0991197affdf0fb2c7
          name: 'F5 BIG-IP: Sync Status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.3375.2.1.14.1.1.0
          key: bigip.syncstatus
          history: 7d
          description: |
            MIB: F5-BIGIP-SYSTEM-MIB
            The sync status ID on the system.
            unknown - the device is disconnected from the device group;
            syncing - the device is joining the device group or has requested changes from device group or inconsistent with the group;
            needManualSync - changes have been made on the device not syncd to the device group;
            inSync - the device is consistent with the device group;
            syncFailed - the device is inconsistent with the device group, requires user intervention;
            syncDisconnected - the device is not connected to any peers;
            standalone - the device is in a standalone configuration;
            awaitingInitialSync - the device is waiting for initial sync;
            incompatibleVersion - the device's version is incompatible with rest of the devices in the device group;
            partialSync - some but not all devices successfully received the last sync.
          valuemap:
            name: 'SNMP sysCmSyncStatusId'
          tags:
            - tag: component
              value: cluster
          triggers:
            - uuid: c9b005eb37094ae583735b28fc3b3426
              expression: 'last(/F5 Big-IP by SNMP_Custom/bigip.syncstatus)=2'
              name: 'F5 BIG-IP: Changes have been made on the device not sync'
              event_name: 'F5 BIG-IP: Changes have been made on the device not sync to the device group: {ITEM.VALUE}'
              opdata: '{ITEM.LASTVALUE}'
              priority: WARNING
              description: 'Changes have been made on the device not sync to the device group, requires user intervention'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
            - uuid: cba032799e074a0ba69742e0e1989745
              expression: 'last(/F5 Big-IP by SNMP_Custom/bigip.syncstatus)=4'
              name: 'F5 BIG-IP: The device is inconsistent with the device group'
              event_name: 'F5 BIG-IP: The device is inconsistent with the device group: {ITEM.VALUE}'
              opdata: '{ITEM.LASTVALUE}'
              priority: WARNING
              description: 'The device is inconsistent with the device group, requires user intervention'
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
