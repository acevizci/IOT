                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
            - uuid: a91ae0eecad14df6a5874f6ff683979f
              name: '{#SNMPVALUE}: Temperature'
              type: SNMP_AGENT
              snmp_oid: '1.3.6.1.4.1.9.9.91.1.1.1.1.4.{#SNMPINDEX}'
