              expression: 'count(/Template_Cisco_Traps/snmptrap["ospfTxRetransmit"],1h,"like","ospfTxRetransmit")>30 and nodata(/Template_Cisco_Traps/snmptrap["ospfTxRetransmit"],1h)=0'
