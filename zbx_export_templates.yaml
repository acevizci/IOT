                  obj = JSON.parse(value, function(key, value) 
                      {
                        if (key == 'creationTime') return new Date(value).toDateString(); 
                        return value;
                      });
                  return JSON.stringify(obj);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 6h
