          item_prototypes:
            - uuid: a7f1f913440847b4b689865cae8d5f86
              name: 'F5 BIG-IP: Certificate [{#CERT.NAME}]: Expiration date'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.3375.2.1.15.1.2.1.5.{#SNMPINDEX}'
              key: 'bigip.cert.expiration.date[{#CERT.NAME}]'
              delay: 12h
              history: 7d
              trends: '0'
              units: unixtime
              description: |
                MIB: F5-BIGIP-SYSTEM-MIB
                The expiration date of the certificate in unix time.
              tags:
                - tag: certificate
                  value: '{#CERT.NAME}'
                - tag: component
                  value: certificate
              trigger_prototypes:
                - uuid: cbc4a020058b42adb8c920fe9a136e62
                  expression: 'last(/F5 Big-IP by SNMP_Custom/bigip.cert.expiration.date[{#CERT.NAME}]) - 86400 * {$BIGIP.CERT.MIN} < now()'
                  name: 'F5 BIG-IP: Certificate expires ({#CERT.NAME})'
                  event_name: 'F5 BIG-IP: Less than {$BIGIP.CERT.MIN} days left until the certificate expires ({#CERT.NAME})'
                  opdata: 'Expires: {ITEM.VALUE}'
                  priority: WARNING
                  description: 'Please check certificate'
                  tags:
                    - tag: scope
                      value: security
        - uuid: 8beaa9d97c424f149ae03255c8620751
          name: 'Chassis fan discovery'
          type: SNMP_AGENT
          snmp_oid: 'discovery[{#FAN.INDEX},.1.3.6.1.4.1.3375.2.1.3.2.1.2.1.1]'
          key: bigip.chassis.fan.discovery
          delay: 1h
          description: 'A table containing information of chassis fan status of the system'
          item_prototypes:
            - uuid: ed9b5d84b5294023bbd8c9d161e4eaeb
              name: 'F5 BIG-IP: FAN [{#FAN.INDEX}]: Speed'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.3375.2.1.3.2.1.2.1.3.{#SNMPINDEX}'
              key: 'bigip.chassis.fan.speed[{#FAN.INDEX}]'
              delay: 5m
              history: 7d
              units: '!rpm'
              description: |
                MIB: F5-BIGIP-SYSTEM-MIB
                The actual speed of the indexed chassis fan on the system.
                This is only supported for the platform where the actual
                fan speed data is available.
                '0' means fan speed is unavailable while the associated chassis status is good.
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: fan
                - tag: component
                  value: sensor
            - uuid: fcc42eb596d3483baa04911c8fc22b7d
              name: 'F5 BIG-IP: FAN [{#FAN.INDEX}]: Status'
              type: SNMP_AGENT
              snmp_oid: '.1.3.6.1.4.1.3375.2.1.3.2.1.2.1.2.{#SNMPINDEX}'
              key: 'bigip.chassis.fan.status[{#FAN.INDEX}]'
              delay: 5m
              history: 7d
              description: |
                MIB: F5-BIGIP-SYSTEM-MIB
                The status of the indexed chassis fan on the system.,
                This is only supported for the platform where
                the sensor data is available.
                Possible values: 0 - bad, 1 - good, 2 - notpresent.
              valuemap:
                name: 'Chassis status'
              preprocessing:
                - type: DISCARD_UNCHANGED_HEARTBEAT
                  parameters:
                    - 1h
              tags:
                - tag: component
                  value: fan
                - tag: component
                  value: sensor
              trigger_prototypes:
                - uuid: 369fca25bee149719f9386c1d5ae2f63
                  expression: 'last(/F5 Big-IP by SNMP_Custom/bigip.chassis.fan.status[{#FAN.INDEX}])=0'
                  name: 'F5 BIG-IP: Fan[{#FAN.INDEX}] is in critical state'
                  priority: AVERAGE
                  description: 'Please check the fan unit'
                  tags:
                    - tag: scope
                      value: notice
                - uuid: d79083e1012d498ea9d1f2f43851ef5c
                  expression: 'last(/F5 Big-IP by SNMP_Custom/bigip.chassis.fan.status[{#FAN.INDEX}])=2'
                  name: 'F5 BIG-IP: Fan[{#FAN.INDEX}] is not present'
                  priority: INFO
                  description: 'Please check the fan unit'
                  tags:
                    - tag: scope
                      value: notice
          graph_prototypes:
            - uuid: 4792579494bd434b80cc489bc5879e5b
              name: 'F5 BIG-IP: FAN [{#FAN.INDEX}] speed'
              graph_items:
                - color: 1A7C11
