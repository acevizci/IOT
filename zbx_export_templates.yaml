    - uuid: 5ef8ea994a8a4ea09ab001c5d9a27656
      template: 'Cisco IOS by SNMP_Omurga_Switch'
      name: 'Cisco IOS by SNMP_Omurga_Switch'
      description: |
        Template Cisco IOS Software releases 12.2(3.5) or later
        
        MIBs used:
        CISCO-MEMORY-POOL-MIB
        IF-MIB
        EtherLike-MIB
        HOST-RESOURCES-MIB
        SNMPv2-MIB
        CISCO-ENVMON-MIB
        CISCO-PROCESS-MIB
        ENTITY-MIB
        
        Known Issues:
        
          Description: no if(in|out)(Errors|Discards) are available for vlan ifType
          Version: IOS for example: 12.1(22)EA11, 15.4(3)M2
          Device: C2911, C7600
        
        Template tooling version used: 0.41
      groups:
        - name: HG_Omurga_Switch
      items:
        - uuid: 710be342c5a34e94aab9f4f111e82096
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          history: 1w
          valuemap:
            name: 'Service state'
          tags:
            - tag: component
              value: health
            - tag: component
              value: network
          triggers:
            - uuid: 52128d99554943f591658a7614e54846
              expression: 'max(/Cisco IOS by SNMP_Omurga_Switch/icmpping,#3)=0'
              name: 'Unavailable by ICMP ping'
              priority: HIGH
              description: 'Last three attempts returned timeout.  Please check device connectivity.'
              tags:
                - tag: scope
                  value: availability
