                    - tag: scope
                      value: performance
                - uuid: 6be70b839b714073b4fd001ec1c73a7b
                  expression: 'avg(/Saha_sw_Cisco Nexus 9000 Series by SNMP2/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_WARN:"{#SNMPVALUE}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'max(/Saha_sw_Cisco Nexus 9000 Series by SNMP2/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_WARN:"{#SNMPVALUE}"}-3'
                  name: '{#SNMPVALUE}: Temperature is above warning threshold'
                  event_name: '{#SNMPVALUE}: Temperature is above warning threshold: >{$TEMP_WARN:"{#SNMPVALUE}°C"}'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: WARNING
                  description: 'This trigger uses the values of the temperature sensor.'
                  dependencies:
                    - name: '{#SNMPVALUE}: Temperature is above critical threshold'
                      expression: 'avg(/Saha_sw_Cisco Nexus 9000 Series by SNMP2/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_CRIT:"{#SNMPVALUE}"}'
                      recovery_expression: 'max(/Saha_sw_Cisco Nexus 9000 Series by SNMP2/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_CRIT:"{#SNMPVALUE}"}-3'
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
                - uuid: 53b671b7049244afab9d13e3eacc8ce0
                  expression: 'avg(/Saha_sw_Cisco Nexus 9000 Series by SNMP2/sensor.temp.value[{#SNMPINDEX}],5m)<{$TEMP_CRIT_LOW:"{#SNMPVALUE}"}'
                  recovery_mode: RECOVERY_EXPRESSION
                  recovery_expression: 'min(/Saha_sw_Cisco Nexus 9000 Series by SNMP2/sensor.temp.value[{#SNMPINDEX}],5m)>{$TEMP_CRIT_LOW:"{#SNMPVALUE}"}-3'
                  name: '{#SNMPVALUE}: Temperature is too low'
                  event_name: '{#SNMPVALUE}: Temperature is too low: <{$TEMP_CRIT_LOW:"{#SNMPVALUE}°C"}'
                  opdata: 'Current value: {ITEM.LASTVALUE}'
                  priority: AVERAGE
                  tags:
                    - tag: scope
                      value: availability
                    - tag: scope
                      value: performance
          graph_prototypes:
            - uuid: 2e52398ad66f4a3f9f1e27c191db5810
              name: '{#SNMPVALUE}: Temperature'
              ymin_type_1: FIXED
              ymax_type_1: FIXED
              graph_items:
                - drawtype: GRADIENT_LINE
                  color: 1A7C11
                  item:
                    host: 'Saha_sw_Cisco Nexus 9000 Series by SNMP2'
                    key: 'sensor.temp.value[{#SNMPINDEX}]'
          preprocessing:
            - type: JAVASCRIPT
              parameters:
                - |
                  try {
                      var sensors = JSON.parse(value);
                  } catch (e) {
                      throw "Failed to parse JSON of temperature discovery.";
                  }
                  
                  var scales = {'9': 1, '8': 0.001, '7': 0.000001};
                  var result = sensors.filter(function (sensor) {      
                      if (sensor['{#SENSOR_TYPE}'] !== '8' || typeof(scales[sensor['{#SENSOR_SCALE}']]) === 'undefined') {
                          return false;
                      }
                      sensor['{#SENSOR_SCALE}'] = scales[sensor['{#SENSOR_SCALE}']];
                      return true;
                  });
                  
                  return JSON.stringify(result);
            - type: DISCARD_UNCHANGED_HEARTBEAT
              parameters:
                - 4h
