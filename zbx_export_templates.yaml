                  value: availability
                - tag: scope
                  value: performance
            - uuid: 70ccd43b6ddd4cbe94d5d002f1db30ad
              expression: |
                avg(/Cisco IOS by SNMP_Omurga_Switch/sensor.temp.value[ciscoEnvMonTemperatureValue.{#SNMPINDEX}],5m)>{$TEMP_WARN:"{#SNMPVALUE}"}
                or
