    - uuid: 1c8c293bf0ac49398bcdc42b93d678e6
      template: 'F5 Big-IP by SNMP_Custom'
      name: 'F5 Big-IP by SNMP_Custom'
      description: |
        MIBs used:
        RFC1213-MIB
        F5-BIGIP-LOCAL-MIB
        F5-BIGIP-SYSTEM-MIB
        
        Template tooling version used: 0.41
      groups:
        - name: HG_Kenar_Switch
      items:
        - uuid: b688f670785b4648b12612c05e69a3c8
          name: 'F5 BIG-IP: Failover status'
          type: SNMP_AGENT
          snmp_oid: 1.3.6.1.4.1.3375.2.1.14.3.1.0
          key: bigip.failover
          history: 7d
          description: |
            MIB: F5-BIGIP-SYSTEM-MIB
            The failover status ID on the system.
            unknown - the failover status of the device is unknown;
            offline - the device is offline;
            forcedOffline - the device is forced offline;
            standby - the device is standby;
            active - the device is active.
          valuemap:
            name: 'SNMP sysCmFailoverStatusId'
          tags:
            - tag: component
              value: cluster
          triggers:
            - uuid: 3dd993973df948afbb8c778de02ab9e7
              expression: 'count(/F5 Big-IP by SNMP_Custom/bigip.failover,10m,"ne","3")>8 and count(/F5 Big-IP by SNMP_Custom/bigip.failover,10m,"ne","4")>6'
              name: 'F5 BIG-IP: Cluster not in sync'
              event_name: 'F5 BIG-IP: Cluster not in sync: {ITEM.VALUE}'
              opdata: '{ITEM.LASTVALUE}'
              priority: WARNING
              manual_close: 'YES'
              tags:
                - tag: scope
                  value: notice
        - uuid: ec640edf76f54ec683a56c3ede1e2c31
          name: 'F5 BIG-IP: Hardware model name'
          type: SNMP_AGENT
          snmp_oid: .1.3.6.1.2.1.1.1.0
          key: bigip.model
          delay: 1h
          history: 7d
          trends: '0'
          value_type: CHAR
